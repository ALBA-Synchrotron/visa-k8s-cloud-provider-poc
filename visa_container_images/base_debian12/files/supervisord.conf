[supervisord]
nodaemon=true

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman --nodaemon
priority=103
startsecs=10
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr

[program:xrdp]
command=/usr/sbin/xrdp -nodaemon
autostart=true
autorestart=true

[program:cups]
command=/usr/sbin/cupsd -l
autostart=true
autorestart=true
